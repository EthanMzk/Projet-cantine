name: cantine.xml

on:
  workflow_dispatch: # permet de lancer manuellement
  schedule:
    - cron: '0 7 * * *' # optionnel : lance tous les jours à 7h

jobs:
  update-cantine:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le dépôt
      - name: Checkout du dépôt
        uses: actions/checkout@v3

      # 2️⃣ Installer Python
      - name: Configurer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3️⃣ Installer les dépendances
      - name: Installer les dépendances
        run: |
          pip install requests

      # 4️⃣ Exécuter le script pour générer cantine.xml
      - name: Exécuter generate_rss.py
        run: |
          python generate_rss.py

      # 5️⃣ Commit des changements si cantine.xml a été modifié
      - name: Commit des changements
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cantine.xml
          git diff --cached --quiet || git commit -m "Mise à jour automatique cantine.xml"

      # 6️⃣ Push sur GitHub directement avec GITHUB_TOKEN
      - name: Push sur GitHub
        run: |
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/EthanMzk/Projet-cantine.git main
