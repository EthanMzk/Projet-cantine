name: cantine.xml

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

jobs:
  update-cantine:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le dépôt
      - name: Checkout du dépôt
        uses: actions/checkout@v3

      # 2️⃣ Installer Python
      - name: Configurer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # 3️⃣ Installer les dépendances
      - name: Installer les dépendances
        run: |
          pip install requests beautifulsoup4

      # 4️⃣ Exécuter le script
      - name: Exécuter generate_rss.py
        run: |
          python generate_rss.py

      # 5️⃣ Commit si modification
      - name: Commit des changements
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cantine.xml
          git diff --cached --quiet || git commit -m "Mise à jour automatique cantine.xml"

      # 6️⃣ Push
      - name: Push sur GitHub
        run: |
          git push
