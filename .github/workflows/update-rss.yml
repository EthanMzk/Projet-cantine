name: Update RSS

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Generate RSS
        run: python generate_rss.py

      - name: Commit changes
        run: |
          git config --global user.name "rss-bot"
          git config --global user.email "rss@example.com"
          git add cantine.xml
          git commit -m "Update RSS" || exit 0
          git push
