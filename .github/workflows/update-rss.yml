name: cantine.xml

on:
  workflow_dispatch: # Permet de lancer manuellement avec "Run workflow"
  schedule:
    - cron: '0 7 * * *' # Optionnel : lance tous les jours à 7h

jobs:
  update-cantine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v3

      - name: Configurer Python (si ton script est en Python)
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Exécuter le script pour générer cantine.xml
        run: |
          python generate_rss.py

      - name: Commit des changements
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add cantine.xml
          git diff --cached --quiet || git commit -m "Mise à jour automatique cantine.xml"

      - name: Push sur GitHub
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
